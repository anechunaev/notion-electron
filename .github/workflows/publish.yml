# Required GitHub secrets:
#   MAINTAINER_GPG_KEY         base64 of the maintainer private key (maintainer-key.b64)
#   MAINTAINER_GPG_ID          maintainer@example.com
#   MAINTAINER_GPG_PASSPHRASE  passphrase for the maintainer key (maintainer-key.passphrase)
#   REPO_SSH_KEY               private SSH key for the publish user
#   REPO_HOST                  repo.example.com
#   REPO_USER                  the SFTP publish user (e.g. "publish")
#   REPO_KNOWN_HOSTS           output of `ssh-keyscan repo.example.com`
name: Sign and publish packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      # 1) Get the already-built packages from the latest release assets
      - name: Download release assets
        uses: robinraju/release-downloader@v1
        with:
          latest: true
          fileName: "*"
          out-file-path: dist

      # 2) Import the MAINTAINER key (passphrase-protected, package signing identity)
      - name: Import maintainer GPG key
        env:
          MAINTAINER_GPG_KEY: ${{ secrets.MAINTAINER_GPG_KEY }}
        run: echo "$MAINTAINER_GPG_KEY" | base64 -d | gpg --batch --import

      # 3) Embedded rpm signature so dnf clients' gpgcheck=1 also verifies the
      #    package (defence in depth). dpkg-sig is intentionally NOT used: apt
      #    never checks per-package signatures, so it would be pure overhead.
      #    MUST run BEFORE the detached signatures below: `rpm --addsign` rewrites
      #    the .rpm bytes, so a detached .asc taken earlier would no longer match
      #    the uploaded file and the server's signature gate would reject it.
      - name: Add embedded rpm signature
        env:
          MAINTAINER_GPG_ID: ${{ secrets.MAINTAINER_GPG_ID }}
          MAINTAINER_GPG_PASSPHRASE: ${{ secrets.MAINTAINER_GPG_PASSPHRASE }}
        run: |
          shopt -s nullglob
          rpms=(dist/*.rpm); [ ${#rpms[@]} -eq 0 ] && exit 0
          sudo apt-get update && sudo apt-get install -y rpm
          printf '%s' "$MAINTAINER_GPG_PASSPHRASE" > "$HOME/.gpg-pass"
          chmod 600 "$HOME/.gpg-pass"
          cat > "$HOME/.rpmmacros" <<EOF
          %_gpg_name ${MAINTAINER_GPG_ID}
          %_gpg_sign_cmd_extra_args --pinentry-mode loopback --passphrase-file ${HOME}/.gpg-pass
          EOF
          for f in "${rpms[@]}"; do rpm --addsign "$f"; done

      # 4) Detached signature per artifact. For rpm this signs the FINAL bytes
      #    (after the embedded signature above), so the detached .asc the server
      #    verifies matches the exact file clients download.
      - name: Sign packages (detached, maintainer key)
        env:
          MAINTAINER_GPG_ID: ${{ secrets.MAINTAINER_GPG_ID }}
          MAINTAINER_GPG_PASSPHRASE: ${{ secrets.MAINTAINER_GPG_PASSPHRASE }}
        run: |
          shopt -s nullglob
          for f in dist/*.deb dist/*.rpm dist/*.flatpak; do
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "$MAINTAINER_GPG_PASSPHRASE" \
                --local-user "$MAINTAINER_GPG_ID" \
                --detach-sign --armor "$f"
          done

      # 5) SSH key + pinned host key
      - name: Set up SSH
        env:
          REPO_SSH_KEY: ${{ secrets.REPO_SSH_KEY }}
          REPO_KNOWN_HOSTS: ${{ secrets.REPO_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$REPO_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$REPO_KNOWN_HOSTS" > ~/.ssh/known_hosts

      # 6) Upload packages + *.asc into the SFTP chroot, THEN the trigger marker
      #    (uploaded last so the server only publishes a complete set). The marker
      #    carries this run's id so we can match the server's completion status.
      #    The server's systemd path unit runs publish-all.sh on the marker.
      - name: Upload signed packages and trigger publish
        env:
          REPO_USER: ${{ secrets.REPO_USER }}
          REPO_HOST: ${{ secrets.REPO_HOST }}
        run: |
          printf '%s\n' "$RUN_ID" > ready
          {
            for f in dist/*.deb dist/*.deb.asc;         do [ -e "$f" ] && echo "put \"$f\" /deb/"; done
            for f in dist/*.rpm dist/*.rpm.asc;         do [ -e "$f" ] && echo "put \"$f\" /rpm/"; done
            for f in dist/*.flatpak dist/*.flatpak.asc; do [ -e "$f" ] && echo "put \"$f\" /flatpak/"; done
            echo "put ready /trigger/ready"
          } > sftp-batch
          sftp -b sftp-batch -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$REPO_USER@$REPO_HOST"

      # 7) Wait for the server-side re-index to finish. publish-all.sh writes
      #    `done <run-id>` (or `failed <run-id>`) into /trigger/status; we poll
      #    it over SFTP until this run's marker shows up.
      - name: Wait for server-side publish to complete
        env:
          REPO_USER: ${{ secrets.REPO_USER }}
          REPO_HOST: ${{ secrets.REPO_HOST }}
        run: |
          deadline=$(( SECONDS + 1800 ))   # 30 min ceiling
          while :; do
            rm -f status.tmp
            echo "get /trigger/status status.tmp" | sftp -b - -i ~/.ssh/id_ed25519 \
              -o BatchMode=yes -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=10 "$REPO_USER@$REPO_HOST" >/dev/null 2>&1 || true
            line="$( [ -f status.tmp ] && head -n1 status.tmp || true )"
            case "$line" in
              "done $RUN_ID"*)   echo "publish complete: $line"; break ;;
              "failed $RUN_ID"*) echo "::error::server-side publish failed: $line"; exit 1 ;;
              *)                 echo "waiting for publish (last status: ${line:-none})" ;;
            esac
            [ "$SECONDS" -ge "$deadline" ] && { echo "::error::timed out waiting for publish"; exit 1; }
            sleep 15
          done
