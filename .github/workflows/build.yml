name: Electron Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'test/*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
    - name: 'Setup jq'
      uses: dcarbone/install-jq-action@v3
    - name: Install Snapcraft
      uses: samuelmeuli/action-snapcraft@v3

    - name: Set up LXD
      uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1

    - name: Electron Builder Action
      uses: anechunaev/action-electron-builder@6fd8ce62ffad14385ddbb3a43c17d3b52661f3ff # v1.8.0
      with:
        github_token: ${{ secrets.github_token }}
        release: ${{ startsWith(github.ref, 'refs/tags/v') }}
        build_script_name: snap-build

  flatpak:
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    steps:
    - uses: actions/checkout@v6

    - name: Install flatpak toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder python3-pip
        pip3 install --user --break-system-packages flatpak-node-generator \
          || pip3 install --user flatpak-node-generator
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

    - name: Build flatpak bundle (${{ matrix.variant.arch }})
      run: |
        cd dev/flatpak
        # Build the exact commit that triggered this run (the npm-version tag).
        sed -i "s|^\(\s*tag:\).*|\1 '${GITHUB_REF_NAME}'|" io.github.anechunaev.notion-electron.yaml
        # generated-sources.json goes stale on dependency bumps; refresh it.
        flatpak-node-generator npm ../../package-lock.json
        flatpak-builder --user --install-deps-from=flathub --repo=_repo \
          --force-clean --disable-rofiles-fuse --arch="${{ matrix.variant.arch }}" \
          build io.github.anechunaev.notion-electron.yaml
        mkdir -p "$GITHUB_WORKSPACE/dist"
        flatpak build-bundle --arch="${{ matrix.variant.arch }}" _repo \
          "$GITHUB_WORKSPACE/dist/notion-electron-${{ matrix.variant.arch }}.flatpak" \
          io.github.anechunaev.notion-electron

    - name: Upload bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: flatpak-${{ matrix.variant.arch }}
        path: dist/notion-electron-${{ matrix.variant.arch }}.flatpak

  flatpak-release:
    needs: [build, flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
    - name: Download bundle artifact
      uses: actions/download-artifact@v4
      with:
        name: flatpak-${{ matrix.arch }}
        path: dist

    - name: Attach bundle to the release
      env:
        GH_TOKEN: ${{ secrets.github_token }}
        GH_REPO: ${{ github.repository }}
      run: gh release upload "${GITHUB_REF_NAME}" "dist/notion-electron-${{ matrix.arch }}.flatpak" --clobber
