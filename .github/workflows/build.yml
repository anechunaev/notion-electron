name: Electron Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'test/*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
    - name: 'Setup jq'
      uses: dcarbone/install-jq-action@v3
    - name: Install Snapcraft
      uses: samuelmeuli/action-snapcraft@v3

    - name: Initialize LXD
      run: |
        # GitHub runners ship LXD pre-installed, but its socket is owned by the `lxd`
        # group, which the runner user isn't in — and `usermod -aG lxd` won't apply within
        # the same job (no new login shell). Point the LXD daemon at `adm`, a group the
        # runner user is already in, so snapcraft can reach the socket.
        # (Same mechanism as canonical/setup-lxd.)
        sudo snap set lxd daemon.group=adm
        # Wait for the lxd snap to apply the reconfiguration.
        while [ -n "$(snap changes lxd 2>/dev/null | awk '/^[0-9]+/ { if ($2 != "Done") print $2 }')" ]; do
          echo "Waiting for snap changes on LXD to finish"; sleep 1
        done
        sudo lxd waitready --timeout 60
        sudo lxd init --auto || true

    - name: Electron Builder Action
      uses: anechunaev/action-electron-builder@6fd8ce62ffad14385ddbb3a43c17d3b52661f3ff # v1.8.0
      with:
        github_token: ${{ secrets.github_token }}
        release: ${{ startsWith(github.ref, 'refs/tags/v') }}
        build_script_name: snap-build
